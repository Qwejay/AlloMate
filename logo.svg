<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </radialGradient>
    <linearGradient id="trackBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="trackGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <linearGradient id="trackPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#A5B4FC" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- 预先按比例缩放好的 8 种高精度微星模板 -->
    <path id="star_03" d="M 0,-2.4 Q 0,0 2.4,0 Q 0,0 0,2.4 Q 0,0 -2.4,0 Q 0,0 0,-2.4 Z" />
    <path id="star_04" d="M 0,-3.2 Q 0,0 3.2,0 Q 0,0 0,3.2 Q 0,0 -3.2,0 Q 0,0 0,-3.2 Z" />
    <path id="star_05" d="M 0,-4.0 Q 0,0 4.0,0 Q 0,0 0,4.0 Q 0,0 -4.0,0 Q 0,0 0,-4.0 Z" />
    <path id="star_06" d="M 0,-4.8 Q 0,0 4.8,0 Q 0,0 0,4.8 Q 0,0 -4.8,0 Q 0,0 0,-4.8 Z" />
    <path id="star_07" d="M 0,-5.6 Q 0,0 5.6,0 Q 0,0 0,5.6 Q 0,0 -5.6,0 Q 0,0 0,-5.6 Z" />
    <path id="star_08" d="M 0,-6.4 Q 0,0 6.4,0 Q 0,0 0,6.4 Q 0,0 -6.4,0 Q 0,0 0,-6.4 Z" />
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <g transform="translate(256, 256) scale(1.42)" filter="url(#glow)">
    <g transform="rotate(0)">
      <rect x="-120" y="-27" width="240" height="54" rx="27" fill="none" stroke="url(#trackBlue)" stroke-width="12" opacity="0.95" />
    </g>
    <g transform="rotate(120)">
      <rect x="-120" y="-27" width="240" height="54" rx="27" fill="none" stroke="url(#trackGreen)" stroke-width="12" opacity="0.95" />
    </g>
    <g transform="rotate(240)">
      <rect x="-120" y="-27" width="240" height="54" rx="27" fill="none" stroke="url(#trackPurple)" stroke-width="12" opacity="0.95" />
    </g>
  </g>

  <!-- 采用极其规整、无变换属性的原生定位，保证 100% 解析成功 -->
  <g filter="url(#glow)">
